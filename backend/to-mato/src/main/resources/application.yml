spring:
  application:
    name: to-mato

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/tomato
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        jdbc:
          time_zone: Asia/Seoul
    show-sql: false

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 2s

  jackson:
    time-zone: Asia/Seoul

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: 여기에_카카오_REST_API_KEY
            client-secret: 여기에_카카오_CLIENT_SECRET_있으면
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
            scope:
              - profile_nickname
              - account_email

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: change-this-to-very-long-random-secret-key-at-least-32bytes-long
  access-token-ttl-seconds: 1800
  refresh-token-ttl-seconds: 1209600
  header: Authorization
  prefix: "Bearer "

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE